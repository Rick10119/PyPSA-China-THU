version: 0425.1H.1
logging_level: INFO
foresight: "myopic"

# Single-node mode – if true, keep only one target province in the network
using_single_node: False
single_node_province: "Zhejiang"  # Target province when single-node mode is enabled

results_dir: 'results/'
summary_dir: 'summary/'
threads: 192
mem_per_thread: 2500

tmin: '-01-01 00:00'
tmax: '-12-31 23:00'
freq: '1h'

add_aluminum: False
only_other_load: False
iterative_optimization: False
aluminum_commitment: False # keep False for iterative optimization
aluminum_max_iterations: 2  # Maximum number of aluminum–power iterations
aluminum_convergence_tolerance: 0.01  # Convergence threshold (relative change in objective; 0.01 = 1%)

# Aluminum smelter capacity ratio scenarios (100%, 90%, 80%, 70%, 60%)
aluminum_capacity_ratio: 1.0  # 1.0 = 100%, 0.9 = 90%, 0.8 = 80%, 0.7 = 70%, 0.6 = 60%

scenario:
  line_limits: [ 'opt' ]
  pathway: ['linear2050']
  topology: "current+FCG" # "current" or "FCG" or "current+FCG" or "current+Neighbor"
  planning_horizons:
    - 2025
    - 2030
    - 2035
    - 2040
    - 2045
    - 2050
    - 2055
    - 2060
  co2_reduction:
    linear2060:
      '2025': -1.
      '2030': 0.143
      '2035': 0.286
      '2040': 0.429
      '2045': 0.571
      '2050': 0.714
      '2055': 0.857
      '2060': 1.0
    linear2050:
      '2025': -1.
      '2030': 0.0
      '2035': 0.2
      '2040': 0.4
      '2045': 0.6
      '2050': 0.8
      '2055': 0.9
      '2060': 1.0
  opts: ['ll']
  attr: 'p_nom'
  heating_demand: ['positive']

# Second-stage dispatch-only: capacities fixed from solved postnetwork; coal/gas
# main plant as piecewise bids (parallel capacity blocks). CHP remains scalar MC.
# For CSV from this stage use marginal LMPs (`export_reconstructed_prices --price-mode marginal`).
dispatch_segmented_prices:
  enabled: true
  # If true, zero `* gas fuel` generator marginal_cost while segmented OCGT uses full SRMC per block.
  zero_gas_fuel_marginal_cost: true
  export_prices: true
  price_export:
    week_freq: "W-SUN"
    import_agg: "min_offer"
    line_cong_eps_mw: 1.e-3
    min_inflow_mw: 1.e-3
    currency: "CNY"
    fx_cny_per_eur: 7.8
  # Per-segment marginal_cost (EUR/MWh, electricity): full bid stack when fuel gens are zeroed
  # (`zero_gas_fuel_marginal_cost: true`) — each block is absolute SRMC+fuel+carbon+VOM as configured.
  # Five segments; shares align with typical must-run → scarcity partition (see README_cursor.md).
  carriers:
    Generator:
      coal cc:
        shares: [0.50, 0.20, 0.15, 0.10, 0.05]
        marginal_cost: [0.0, 45.0, 55.0, 75.0, 192.0]
    Link:
      OCGT gas:
        shares: [0.50, 0.20, 0.15, 0.10, 0.05]
        marginal_cost: [0.0, 85.0, 100.0, 120.0, 192.0]

solving:
  solver:
    name: gurobi
    options: default
  solver_options:
    default:
      Threads: 192
      Crossover: 0
      Method: 2 # barrier
      BarConvTol: 1.e-5
      FeasibilityTol: 1.e-5
      AggFill: 0
      PreDual: 0
      GURO_PAR_BARDENSETHRESH: 200
      DualReductions: 0
      OutputFlag: 1  # 关闭Gurobi输出
      LogToConsole: 1  # 关闭控制台日志
      LogFile: ''  # 关闭日志文件
    MILP:
      Threads: 90
      Method: -1 # 自动选择，通常是对偶单纯形法，更适合分支定界
      MIPGap: 1.e-2
      TimeLimit: 7200
      Heuristics: 0.5 # 增加启发式搜索的强度
      Cuts: 0 # 尝试关闭大部分割平面生成，或设置为1 (温和生成)
      Presolve: -1 # 保持默认，通常是有益的
  options:
    track_iterations: false
    min_iterations: 4
    max_iterations: 6
    skip_iterations: false
    formulation: kirchhoff
    load_shedding: false
    noisy_costs: false
    clip_p_max_pu: 0.01

  mem: 150000 #memory in MB; 20 GB enough for 50+B+I+H2; 100 GB for 181+B+I+H2

aluminum:
  grid_interaction:
    "2020": false
    "2025": false
    "2030": true
    "2035": true
    "2040": true
    "2045": true
    "2050": true
    "2055": true
    "2060": true

  # Aluminum smelter capacity ratio (overrides top-level `aluminum_capacity_ratio` if set)
  capacity_ratio: 1.0  # 1.0 = 100%, 0.9 = 90%, 0.8 = 80%, 0.7 = 70%, 0.6 = 60%

  # Scenario-dimension settings (these correspond to the scenario definitions summarized in Table 5 and the SI)
  scenario_dimensions:
    # 1. Smelter operational flexibility scenarios
    smelter_flexibility:
      low:
        p_min_pu: 0.99  # Minimum power level (p.u.)
        restart_cost: 96593.79766  # Restart cost [eur / MW]
        stand_by_cost: 1.2  # Stand-by cost [eur / MW / h]
      mid:
        p_min_pu: 0.9  # Minimum power level (p.u.)
        restart_cost: 13980.68124  # Restart cost [eur / MW]
        stand_by_cost: 1.2  # Stand-by cost [eur / MW / h]
      high:
        p_min_pu: 0.7  # Minimum power level (p.u.)
        restart_cost: 2796.136248  # Restart cost [eur / MW]
        stand_by_cost: 1.2  # Stand-by cost [eur / MW / h]
      non_constrained:
        p_min_pu: 0.0  # Fully flexible operation (no minimum power)
        restart_cost: 0  # No restart cost [eur / MW]
        stand_by_cost: 0  # No stand-by cost [eur / MW / h]
    
    # 2. Market opportunity / technology-cost scenarios
    market_opportunity:
      low:
        vre_cost_factor: 0.8      # Multiplier on VRE capital costs (0.8x)
        battery_cost_factor: 0.8  # Multiplier on battery capital costs (0.8x)
        h2_cost_factor: 0.8       # Multiplier on H2 / long-duration storage costs (0.8x)
        sabatier_cost_factor: 0.8 # Multiplier on methanation (Sabatier) costs (0.8x)
      mid:
        vre_cost_factor: 1.0      # Reference VRE capital costs (1.0x)
        battery_cost_factor: 1.0  # Reference battery capital costs (1.0x)
        h2_cost_factor: 1.0       # Reference H2 / long-duration storage costs (1.0x)
        sabatier_cost_factor: 1.0 # Reference methanation (Sabatier) costs (1.0x)
      high:
        vre_cost_factor: 1.0      # Same VRE capital costs as mid (1.0x)
        battery_cost_factor: 1.5  # Higher battery capital costs (1.5x)
        h2_cost_factor: 1.5       # Higher H2 / long-duration storage costs (1.5x)
        sabatier_cost_factor: 1.5 # Higher methanation (Sabatier) costs (1.5x)
    
    # 3. Employment transfer scenarios (affecting stand-by cost)
    employment_transfer:
      unfavorable:
        stand_by_cost_factor: 0.0  # Unfavorable case – keep stand-by cost at baseline
      favorable:
        stand_by_cost_factor: 1.0  # Favorable case – reduce effective stand-by cost

  # Current scenario combination (default: mid demand, mid flexibility, mid market opportunity)
  current_scenario:
    smelter_flexibility: "mid"
    primary_demand: "mid"
    market_opportunity: "mid"
    employment_transfer: "favorable"
  
  # Aluminum storage costs
  al_marginal_cost_storage: 3.79E-05 # euro/MWh
  al_storage_limit: 8760  # hours (24 * 365)

snapshots:
  start: "2020-01-01"
  end: "2021-01-01"
  inclusive: 'left'

logging:
  level: INFO
  format: '%(levelname)s:%(name)s:%(message)s'
  
enable:
  build_cutout: false
  retrieve_cutout: false
  retrieve_raster: false
  
atlite:
  nprocesses: 4
  show_progress: true
  cutouts:
   China-2020:
     module: era5
     dx: 0.25
     dy: 0.25

solar_thermal_angle: 45

Technique:
