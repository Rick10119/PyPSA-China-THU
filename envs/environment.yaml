#
# A "latest PyPSA" environment for this repo.
# Goals:
# - Track the newest stable PyPSA from conda-forge (no strict pin).
# - Keep the packages used by the Snakefile/scripts in this repo.
# - Avoid overly strict pins to reduce solver conflicts.
#
# Create:
#   conda env create -f envs/environment.yaml
# Activate:
#   conda activate pypsa
#   snakemake --cores 6
# Notes:
# - `gurobi` is included because this repo is configured for it; remove it if you
#   prefer open-source solvers only.
# - If you run into solver/BLAS conflicts, try switching python to 3.10 or 3.12.

name: pypsa
channels:
  - conda-forge
  - bioconda
  - gurobi
dependencies:
  - python=3.11
  - pip

  # Core model stack
  - pypsa=1.2.0
  - atlite
  - linopy
  - dask
  # IMPORTANT: PyPSA/linopy may currently break with very new xarray releases.
  # We pin xarray to a known-compatible range (worked with PyPSA 1.0.6 + linopy 0.6.6).
  - xarray<2025
  - netcdf4
  - pytables
  - networkx
  - numpy
  - pandas
  - scipy

  # Workflow / utilities
  - snakemake-minimal
  # Optional, but avoids Snakemake falling back to greedy scheduling
  - pulp
  - coin-or-cbc
  - pyyaml
  - tqdm
  - progressbar2
  - memory_profiler

  # Excel / parsing
  - openpyxl
  - xlrd
  - lxml
  - pycountry

  # Plotting
  - matplotlib
  - seaborn

  # GIS stack (used by scripts / atlite)
  - geopandas
  - shapely
  - fiona
  - proj
  - rasterio
  - cartopy
  - geopy
  - pyogrio
  - poppler
  - descartes
  - country_converter

  # Optimisation / solver interface
  - pyomo
  - gurobi

  # Optional (keep parity with existing env)
  - tabula-py
  - graphviz
  - ipython

  # pip-only packages used in this repo
  - pip:
      - vresutils>=0.3.1
      - tsam>=1.1.0
      - powerplantmatching>=0.4.8

